<article class="pokemon-card-shell">
  <a [routerLink]="['/pokedex', pokemon.pokemonId]" class="pokemon-card-link">
    <img [src]="pokemon.image" [alt]="pokemon.name" class="pokemon-card-image" />
    <h2 class="pokemon-card-name">
      {{ pokemon.name }}
    </h2>
    <p class="pokemon-card-id">
      #{{ pokemon.pokemonId }}
    </p>
  </a>
</article>
