<article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm hover:shadow-md transition">
  <a [routerLink]="['/pokedex', pokemon.pokemonId]" class="block">
    <img [src]="pokemon.image" [alt]="pokemon.name" class="mx-auto h-24 w-24 object-contain" />
    <h2 class="mt-3 text-center text-lg font-semibold text-slate-800">
      {{ pokemon.name }}
    </h2>
    <p class="text-center text-sm text-slate-500">
      #{{ pokemon.pokemonId }}
    </p>
  </a>
</article>
