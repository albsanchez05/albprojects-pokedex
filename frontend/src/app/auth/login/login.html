<!-- File: frontend/src/app/auth/login/login.html
     Purpose: Defines Angular component template markup for the view layer. -->
<main class="min-h-screen bg-slate-100 flex items-center justify-center p-6">
  <section class="w-full max-w-md bg-white rounded-xl shadow p-6">
    <h1 class="text-2xl font-bold text-slate-800 mb-6">Login</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
        <input formControlName="username" class="w-full rounded border border-slate-300 px-3 py-2" />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input type="password" formControlName="password" class="w-full rounded border border-slate-300 px-3 py-2" />
      </div>

      <p *ngIf="errorMessage" class="text-sm text-red-600">{{ errorMessage }}</p>

      <button
        type="submit"
        [disabled]="isSubmitting"
        class="w-full rounded bg-blue-600 text-white py-2 font-semibold hover:bg-blue-700 disabled:opacity-50"
      >
        {{ isSubmitting ? "Signing in..." : "Sign in" }}
      </button>
    </form>

    <p class="mt-4 text-sm text-slate-600">
      No account?
      <a routerLink="/register" class="text-blue-600 hover:underline">Create one</a>
    </p>
  </section>
</main>
