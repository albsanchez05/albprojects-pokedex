spring.application.name=pokedex

# 1. Credentials and Connection Details
# Override with environment variables for Docker, PO/QA, or local developer setups.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pokedex_database}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:professor-oak}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:gottacatchthemall}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

# 2. Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# 3. Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# 4. JWT Security Configuration
# Secret key used to sign and verify JWT tokens (change this to a secure random value in production)
security.jwt.secret-key=c9y5ZddDJHtlZwCIWJRAsQlKpwIKbjinrKNJJ5uEbIu
# Token expiration time in milliseconds (86400000 = 24 hours)
security.jwt.expiration-ms=86400000
# Issuer claim embedded in the token to identify the source application
security.jwt.issuer=pokedex-api

server.port=${SERVER_PORT:8082}

logging.file.name=${LOGGING_FILE_NAME:logs/pokedex.log}
# or:
# logging.file.path=logs

# 5. External PokeAPI integration
integration.pokeapi.base-url=${INTEGRATION_POKEAPI_BASE_URL:https://pokeapi.co/api/v2}
integration.pokeapi.connect-timeout-ms=${INTEGRATION_POKEAPI_CONNECT_TIMEOUT_MS:7000}
integration.pokeapi.read-timeout-ms=${INTEGRATION_POKEAPI_READ_TIMEOUT_MS:20000}
integration.pokeapi.enabled=${INTEGRATION_POKEAPI_ENABLED:true}

