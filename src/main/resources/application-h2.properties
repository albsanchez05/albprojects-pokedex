# Local runtime profile for browser-accessible H2 console.
spring.datasource.url=jdbc:h2:mem:pokedex_local;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Keep startup simple in local H2 mode: schema comes from entities.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.flyway.enabled=false

# Enable H2 web console.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Keep same JWT settings while running with H2 locally.
security.jwt.secret-key=c9y5ZddDJHtlZwCIWJRAsQlKpwIKbjinrKNJJ5uEbIu
security.jwt.expiration-ms=86400000
security.jwt.issuer=pokedex-api

