spring.application.name=pokedex

# 1. Use in-memory H2 database for tests (isolated, fast, auto-cleaned)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# 3. Flyway Configuration - use test migrations folder
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration/test

# 4. JWT Security Configuration (same as production)
security.jwt.secret-key=c9y5ZddDJHtlZwCIWJRAsQlKpwIKbjinrKNJJ5uEbIu
security.jwt.expiration-ms=86400000
security.jwt.issuer=pokedex-api

server.port=8082

logging.file.name=logs/pokedex-test.log

# 5. External PokeAPI integration (test defaults)
integration.pokeapi.base-url=https://pokeapi.co/api/v2
integration.pokeapi.connect-timeout-ms=2000
integration.pokeapi.read-timeout-ms=5000
integration.pokeapi.enabled=true